cat > app/index.html << 'EOF'
<!DOCTYPE html>
<html>
<head>
    <title>My CI/CD App - v1.0</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        h1 { font-size: 3em; margin-bottom: 10px; }
        p { font-size: 1.2em; opacity: 0.9; }
        .status { color: #4ade80; font-weight: bold; }
        .version { font-size: 0.8em; margin-top: 30px; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="container">
        <h1>(Test Page 2) My App is Live!</h1>
        <p>Deployed via <span class="status">Jenkins + Argo CD</span></p>
        <p>Running on Kubernetes</p>
        <div class="version">Version: 1.0.0</div>
    </div>
</body>
</html>
EOF
